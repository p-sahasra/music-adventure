<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="50%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" ry="80" fill="url(#shine)"/>
  <!-- Decorative music notes (small, scattered) -->
  <g fill="rgba(255,255,255,0.12)">
    <circle cx="90" cy="80" r="18"/>
    <rect x="106" y="30" width="4" height="52" rx="2"/>
    <circle cx="420" cy="100" r="15"/>
    <rect x="433" y="55" width="4" height="47" rx="2"/>
    <circle cx="70" cy="420" r="14"/>
    <rect x="82" y="378" width="4" height="44" rx="2"/>
    <circle cx="440" cy="400" r="16"/>
    <rect x="454" y="352" width="4" height="50" rx="2"/>
  </g>
  <!-- Guitar / Ukulele silhouette -->
  <g transform="translate(256, 268)" fill="white">
    <!-- Neck -->
    <rect x="-14" y="-190" width="28" height="160" rx="6"/>
    <!-- Frets on neck -->
    <rect x="-14" y="-160" width="28" height="3" rx="1" fill="rgba(13,148,136,0.3)"/>
    <rect x="-14" y="-130" width="28" height="3" rx="1" fill="rgba(13,148,136,0.3)"/>
    <rect x="-14" y="-100" width="28" height="3" rx="1" fill="rgba(13,148,136,0.3)"/>
    <rect x="-14" y="-70" width="28" height="3" rx="1" fill="rgba(13,148,136,0.3)"/>
    <!-- Headstock -->
    <rect x="-20" y="-210" width="40" height="28" rx="10" fill="white"/>
    <!-- Tuning pegs -->
    <circle cx="-16" cy="-218" r="6" fill="white"/>
    <circle cx="16" cy="-218" r="6" fill="white"/>
    <circle cx="-16" cy="-198" r="6" fill="white"/>
    <circle cx="16" cy="-198" r="6" fill="white"/>
    <circle cx="-16" cy="-218" r="3" fill="rgba(13,148,136,0.4)"/>
    <circle cx="16" cy="-218" r="3" fill="rgba(13,148,136,0.4)"/>
    <circle cx="-16" cy="-198" r="3" fill="rgba(13,148,136,0.4)"/>
    <circle cx="16" cy="-198" r="3" fill="rgba(13,148,136,0.4)"/>
    <!-- Upper bout -->
    <ellipse cx="0" cy="-15" rx="52" ry="42" fill="white"/>
    <!-- Lower bout (bigger) -->
    <ellipse cx="0" cy="55" rx="72" ry="62" fill="white"/>
    <!-- Sound hole -->
    <circle cx="0" cy="40" r="24" fill="url(#bg)"/>
    <circle cx="0" cy="40" r="20" fill="rgba(255,255,255,0.1)"/>
    <!-- Sound hole ring -->
    <circle cx="0" cy="40" r="27" fill="none" stroke="rgba(13,148,136,0.5)" stroke-width="2"/>
    <!-- Bridge -->
    <rect x="-25" y="80" width="50" height="8" rx="4" fill="rgba(13,148,136,0.35)"/>
    <!-- Strings -->
    <line x1="-6" y1="-185" x2="-6" y2="84" stroke="rgba(13,148,136,0.25)" stroke-width="1.5"/>
    <line x1="6" y1="-185" x2="6" y2="84" stroke="rgba(13,148,136,0.25)" stroke-width="1.5"/>
    <line x1="-2" y1="-185" x2="-2" y2="84" stroke="rgba(13,148,136,0.18)" stroke-width="1"/>
    <line x1="2" y1="-185" x2="2" y2="84" stroke="rgba(13,148,136,0.18)" stroke-width="1"/>
  </g>
  <!-- Sparkle accents -->
  <g fill="rgba(255,255,255,0.6)">
    <polygon points="400,170 404,180 414,184 404,188 400,198 396,188 386,184 396,180" />
    <polygon points="110,300 113,307 120,310 113,313 110,320 107,313 100,310 107,307" />
    <polygon points="390,330 392,335 397,337 392,339 390,344 388,339 383,337 388,335" />
  </g>
</svg>
